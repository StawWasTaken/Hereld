<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orvyn Play</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-primary: #0a0a0c;
    --bg-secondary: #111115;
    --bg-tertiary: #18181d;
    --bg-card: #1a1a20;
    --bg-card-hover: #222229;
    --accent: #f5a623;
    --accent-dim: rgba(245, 166, 35, 0.15);
    --accent-glow: rgba(245, 166, 35, 0.3);
    --text-primary: #e8e8ec;
    --text-secondary: #8a8a96;
    --text-muted: #55555f;
    --border: #2a2a32;
    --success: #34d399;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ─── App Shell ─── */
  .app-shell {
    display: grid;
    grid-template-columns: 64px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* ─── Titlebar ─── */
  .titlebar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    user-select: none;
  }

  .titlebar-title {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.3px;
  }

  .titlebar-title span { color: var(--accent); }

  .titlebar-user {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 4px 12px 4px 4px;
    border-radius: var(--radius-sm);
  }

  .user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }

  .user-name { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

  /* ─── Sidebar ─── */
  .sidebar {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 4px;
  }

  .sidebar-btn {
    width: 42px;
    height: 42px;
    border-radius: var(--radius);
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .sidebar-btn:hover { background: var(--bg-tertiary); color: var(--text-secondary); }
  .sidebar-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .sidebar-btn.active::before {
    content: '';
    position: absolute;
    left: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }

  .sidebar-btn svg { width: 20px; height: 20px; }

  .sidebar-spacer { flex: 1; }

  /* ─── Main Content ─── */
  .main-content {
    overflow-y: auto;
    padding: 0;
  }

  /* ─── Hero / Featured ─── */
  .hero {
    position: relative;
    height: 300px;
    overflow: hidden;
    background: linear-gradient(135deg, #1a1520 0%, #0d1117 50%, #111118 100%);
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .hero h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .hero p {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 500px;
    line-height: 1.5;
  }

  /* ─── Section ─── */
  .section {
    padding: 28px 40px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 16px;
  }

  /* ─── Game Grid ─── */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .game-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s ease;
    border: 1px solid transparent;
    position: relative;
  }

  .game-card:hover {
    transform: translateY(-4px);
    border-color: var(--border);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .game-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .game-card:hover .game-play-overlay { opacity: 1; }

  .game-play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .play-icon {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
  }

  .play-icon svg { width: 18px; height: 18px; margin-left: 2px; }

  .game-info { padding: 12px 14px; }

  .game-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .online-dot {
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
  }

  /* ─── Back Button ─── */
  .back-btn {
    padding: 8px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin: 20px 40px 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .back-btn:hover { color: var(--accent); border-color: var(--accent); }

  .back-btn svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<!-- App Shell -->
<div class="app-shell" id="appShell">

  <!-- Titlebar -->
  <div class="titlebar">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000">O</div>
    </div>
    <div class="titlebar-title">Orvyn <span>Play</span></div>

    <div class="titlebar-user">
      <div class="user-avatar" id="userAvatar">D</div>
      <span class="user-name" id="userName">default</span>
    </div>
  </div>

  <!-- Sidebar -->
  <nav class="sidebar">
    <button class="sidebar-btn active" data-page="discover" title="Discover">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    </button>
    <button class="sidebar-btn" data-page="library" title="My Library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </button>
    <div class="sidebar-spacer"></div>
    <button class="sidebar-btn" title="Back to Home" onclick="window.location.href='/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
  </nav>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const sampleGames = [
  { id: 1, name: 'Neon Speedway', genre: 'Racing', players_online: 142, color: '#6366f1', emoji: '🏎️' },
  { id: 2, name: 'Sky Fortress', genre: 'Adventure', players_online: 87, color: '#0ea5e9', emoji: '🏰' },
  { id: 3, name: 'Pixel Arena', genre: 'Fighting', players_online: 256, color: '#ef4444', emoji: '⚔️' },
  { id: 4, name: 'Craft World', genre: 'Sandbox', players_online: 1204, color: '#22c55e', emoji: '🌍' },
  { id: 5, name: 'Dungeon Crawl', genre: 'RPG', players_online: 63, color: '#a855f7', emoji: '🐉' },
  { id: 6, name: 'Astro Miners', genre: 'Simulation', players_online: 98, color: '#f59e0b', emoji: '🚀' },
  { id: 7, name: 'Ocean Quest', genre: 'Exploration', players_online: 45, color: '#06b6d4', emoji: '🌊' },
  { id: 8, name: 'Zombie Siege', genre: 'Survival', players_online: 312, color: '#84cc16', emoji: '🧟' },
];

let currentUser = 'default';

function gameCard(g) {
  return `
    <div class="game-card">
      <div class="game-thumb" style="background:${g.color}">${g.emoji}</div>
      <div class="game-play-overlay">
        <div class="play-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
      <div class="game-info">
        <div class="game-name">${g.name}</div>
        <div class="game-meta">
          <div style="display:flex;gap:4px;align-items:center"><div class="online-dot"></div>${g.players_online} playing</div>
          <div>${g.genre}</div>
        </div>
      </div>
    </div>
  `;
}

function renderDiscover(games) {
  const featured = games[0];
  document.getElementById('mainContent').innerHTML = `
    <div class="hero">
      <h1>${featured.name}</h1>
      <p>Join ${featured.players_online} players in ${featured.genre.toLowerCase()} games.</p>
    </div>
    <div class="section">
      <div class="section-title">Featured Games</div>
      <div class="game-grid">
        ${games.map(g => gameCard(g)).join('')}
      </div>
    </div>
  `;
}

function renderLibrary(games) {
  document.getElementById('mainContent').innerHTML = `
    <div class="section" style="padding-top:32px">
      <div class="section-title">My Library</div>
      <div class="game-grid">
        ${games.slice(0, 4).map(g => gameCard(g)).join('')}
      </div>
      <p style="color:var(--text-muted);font-size:14px;margin-top:16px">Play games to add them to your library.</p>
    </div>
  `;
}

document.querySelectorAll('.sidebar-btn[data-page]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-btn[data-page]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const page = btn.dataset.page;
    if (page === 'discover') renderDiscover(sampleGames);
    else if (page === 'library') renderLibrary(sampleGames);
  });
});

// Init
renderDiscover(sampleGames);
document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();
document.getElementById('userName').textContent = currentUser;
</script>

</body>
</html>
