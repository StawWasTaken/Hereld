<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orvyn Forge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-primary: #09090b;
    --bg-secondary: #0f0f13;
    --bg-tertiary: #16161c;
    --bg-panel: #111116;
    --bg-input: #1a1a22;
    --accent: #f5a623;
    --accent-dim: rgba(245, 166, 35, 0.12);
    --accent-glow: rgba(245, 166, 35, 0.25);
    --text-primary: #e4e4e8;
    --text-secondary: #7e7e8c;
    --text-muted: #4a4a55;
    --border: #252530;
    --border-focus: #3a3a48;
    --success: #34d399;
    --danger: #f87171;
    --info: #60a5fa;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ─── App Layout ─── */
  .forge-app {
    display: grid;
    grid-template-rows: 40px 36px 1fr 28px;
    height: 100vh;
  }

  /* ─── Title Bar ─── */
  .forge-titlebar {
    display: flex;
    align-items: center;
    padding: 0 12px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    gap: 10px;
    user-select: none;
  }

  .forge-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .forge-title span { color: var(--accent); }

  .forge-logo-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .forge-logo-container img {
    height: 20px;
    width: auto;
    object-fit: contain;
  }

  .title-project {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 8px;
    padding-left: 12px;
    border-left: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }

  .title-user {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .title-user-dot {
    width: 7px; height: 7px;
    background: var(--success);
    border-radius: 50%;
  }

  /* ─── Menu Bar ─── */
  .forge-menubar {
    display: flex;
    align-items: center;
    padding: 0 8px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    gap: 2px;
  }

  .menu-item {
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: none;
    font-family: 'Outfit', sans-serif;
  }

  .menu-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }

  .menu-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

  .toolbar-spacer { flex: 1; }

  .toolbar-btn {
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
  }

  .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }
  .toolbar-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .toolbar-btn.primary:hover { background: #ffb840; }

  .toolbar-btn svg { width: 13px; height: 13px; }

  /* ─── Editor Layout ─── */
  .forge-editor {
    display: grid;
    grid-template-columns: 48px 240px 1fr 280px;
    overflow: hidden;
  }

  /* ─── Tool Sidebar ─── */
  .tool-sidebar {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 2px;
  }

  .tool-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .tool-btn:hover { background: var(--bg-tertiary); color: var(--text-secondary); }
  .tool-btn.active { background: var(--accent-dim); color: var(--accent); }

  .tool-btn svg { width: 17px; height: 17px; }
  .tool-sep { width: 24px; height: 1px; background: var(--border); margin: 4px 0; }

  /* ─── Scene Tree Panel ─── */
  .scene-panel {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

  .scene-tree {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }

  .tree-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--text-secondary);
  }

  .tree-item:hover { background: var(--bg-tertiary); }
  .tree-item.selected { background: var(--accent-dim); color: var(--accent); }

  .tree-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .tree-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ─── Viewport ─── */
  .viewport {
    background: #0d0d14;
    position: relative;
    overflow: hidden;
  }

  .viewport canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ─── Properties Panel ─── */
  .props-panel {
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .props-content {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .prop-section {
    border-bottom: 1px solid var(--border);
  }

  .prop-section-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .prop-fields { padding: 4px 14px 12px; }

  .prop-row {
    display: grid;
    grid-template-columns: 72px 1fr;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .prop-label {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .prop-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    outline: none;
  }

  .prop-input:focus { border-color: var(--accent); }

  /* ─── Status Bar ─── */
  .forge-statusbar {
    display: flex;
    align-items: center;
    padding: 0 12px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    gap: 16px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
  }

  .status-item { display: flex; align-items: center; gap: 5px; }
  .statusbar-spacer { flex: 1; }
</style>
</head>
<body>

<!-- App -->
<div class="forge-app" id="forgeApp">

  <!-- Title Bar -->
  <div class="forge-titlebar">
    <div class="forge-logo-container">
      <img src="../Orvyn icon.png" alt="Orvyn" style="width: 20px; height: 20px; border-radius: 4px;">
      <div class="forge-title">Orvyn <span>Forge</span></div>
    </div>
    <div class="title-project" id="projectName">untitled-project</div>
    <div class="title-user">
      <div class="title-user-dot"></div>
      <span id="forgeUser">default</span>
    </div>
  </div>

  <!-- Menu Bar -->
  <div class="forge-menubar">
    <button class="menu-item">File</button>
    <button class="menu-item">Edit</button>
    <button class="menu-item">View</button>
    <button class="menu-item">Insert</button>
    <div class="menu-sep"></div>
    <button class="toolbar-btn" id="playTestBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Play Test
    </button>
    <div class="toolbar-spacer"></div>
    <a href="/" class="toolbar-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
    <button class="toolbar-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>
      Save
    </button>
    <button class="toolbar-btn primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/></svg>
      Publish
    </button>
  </div>

  <!-- Editor -->
  <div class="forge-editor">

    <!-- Tool sidebar -->
    <div class="tool-sidebar">
      <button class="tool-btn active" title="Select">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
      </button>
      <button class="tool-btn" title="Move">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
      </button>
      <button class="tool-btn" title="Rotate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button class="tool-btn" title="Scale">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" title="Add Box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </button>
      <button class="tool-btn" title="Add Sphere">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      </button>
    </div>

    <!-- Scene Tree -->
    <div class="scene-panel">
      <div class="panel-header">Scene</div>
      <div class="scene-tree" id="sceneTree">
        <div class="tree-item selected">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <span class="tree-item-name">Ground</span>
        </div>
      </div>
    </div>

    <!-- Viewport -->
    <div class="viewport" id="viewport">
      <canvas id="forgeCanvas"></canvas>
    </div>

    <!-- Properties -->
    <div class="props-panel">
      <div class="panel-header">Properties</div>
      <div class="props-content" id="propsContent">
        <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">
          Select an object to view properties.
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="forge-statusbar">
    <div class="status-item"><div class="status-dot"></div> Ready</div>
    <div class="status-item">Objects: 1</div>
    <div class="statusbar-spacer"></div>
    <div class="status-item">Orvyn Forge v0.2.0</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer;

function initEditor() {
  const canvas = document.getElementById('forgeCanvas');
  const vp = document.getElementById('viewport');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x121218);

  camera = new THREE.PerspectiveCamera(60, vp.clientWidth / vp.clientHeight, 0.1, 500);
  camera.position.set(15, 12, 20);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;

  // Grid
  const grid = new THREE.GridHelper(100, 50, 0x2a2a3a, 0x1e1e2a);
  scene.add(grid);

  // Ambient light
  const ambient = new THREE.AmbientLight(0x404060, 0.5);
  scene.add(ambient);

  // Directional light
  const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
  dirLight.position.set(15, 25, 10);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // Sample ground
  const groundGeo = new THREE.BoxGeometry(40, 0.2, 40);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.position.y = -0.1;
  scene.add(ground);

  // Render loop
  function loop() {
    requestAnimationFrame(loop);
    renderer.render(scene, camera);
  }
  requestAnimationFrame(loop);

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = vp.clientWidth / vp.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(vp.clientWidth, vp.clientHeight);
  });
}

setTimeout(() => {
  initEditor();
}, 100);
</script>

</body>
</html>
